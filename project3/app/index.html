<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Financial Tracker</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="header">
    <h1>💰 Financial Tracker</h1>
    <p>Track your income & expenses — Deployed on AWS via Terraform</p>
  </div>

  <!-- Summary Cards -->
  <div class="summary-cards">
    <div class="card income">
      <label>Total Income</label>
      <div class="amount" id="totalIncome">₹0</div>
    </div>
    <div class="card expense">
      <label>Total Expenses</label>
      <div class="amount" id="totalExpense">₹0</div>
    </div>
    <div class="card balance">
      <label>Net Balance</label>
      <div class="amount" id="netBalance">₹0</div>
    </div>
  </div>

  <!-- Main Grid -->
  <div class="main-grid">

    <!-- Add Transaction Form -->
    <div class="box">
      <h3>➕ Add Transaction</h3>

      <div class="form-group">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Salary, Rent, Food..."/>
      </div>

      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="Enter amount"/>
      </div>

      <div class="form-group">
        <label>Type</label>
        <select id="type">
          <option value="income">💚 Income</option>
          <option value="expense">🔴 Expense</option>
        </select>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="Salary">💼 Salary</option>
          <option value="Food">🍕 Food</option>
          <option value="Rent">🏠 Rent</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Health">💊 Health</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>

      <button class="btn-add" onclick="addTransaction()">
        Add Transaction
      </button>
    </div>

    <!-- Transactions List -->
    <div class="box">
      <h3>📋 Recent Transactions</h3>
      <div class="tx-list" id="txList"></div>
    </div>

  </div>

  <!-- Category Chart -->
  <div class="chart-box">
    <h3>📊 Spending by Category</h3>
    <div id="barChart"></div>
  </div>

  <div class="infra-badge">
    🏗️ AWS EC2 (t2.micro) · Nginx · Terraform Project 1 · Amazon Linux 2
  </div>

  <!-- JS last లో load చేయి -->
  <script src="app.js"></script>

</body>
</html>
